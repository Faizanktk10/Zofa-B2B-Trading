services:
  - name: zofa-frontend
    type: web
    env:
      - key: VITE_API_URL
        value: https://zofa-b2b-trading.onrender.com/api
    buildCommand: npm run build
    startCommand: npx serve -s dist -l 3000
    routes:
      # SPA fallback: Render ke routing layer ko index.html pe bheje.
      - path: /
        type: rewrite
        to: /index.html
      - path: /:splat
        type: rewrite
        to: /index.html

      # Common singular/plural + typo aliases (only main segment)
      - path: /supplier
        type: rewrite
        to: /suppliers
      - path: /buyer
        type: rewrite
        to: /buyers
      - path: /category
        type: rewrite
        to: /categories
      - path: /rfq
        type: rewrite
        to: /rfqs
      - path: /price
        type: rewrite
        to: /pricing
      - path: /contactus
        type: rewrite
        to: /contact





