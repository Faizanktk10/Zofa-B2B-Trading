services:
  - name: zofa-frontend
    type: web
    env:
      - key: VITE_API_URL
        value: https://zofa-b2b-trading.onrender.com/api
    buildCommand: npm run build
    startCommand: npx serve dist -l 3000
    routes:
      - path: /
        type: rewrite
        to: /index.html
      - path: /:splat
        type: rewrite
        to: /index.html
      # If the platform still does not rewrite SPA routes, serve index.html explicitly.
      - path: /rfqs
        type: rewrite
        to: /index.html
      - path: /buyers
        type: rewrite
        to: /index.html
      - path: /suppliers
        type: rewrite
        to: /index.html
      - path: /dashboard/buyer
        type: rewrite
        to: /index.html
      - path: /dashboard/supplier
        type: rewrite
        to: /index.html
      - path: /admin
        type: rewrite
        to: /index.html
      - path: /admin/:splat
        type: rewrite
        to: /index.html


